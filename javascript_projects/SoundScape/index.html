<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <title>MUSIC WEBSITE</title>
</head>

<body>
    <div class="navbar  bg-dark ">
        <div class="logo d-flex text-success ms-1">
            <i class="fa-solid fa-music "></i>
            <h1 class=" ms-1"><span class="text-light">Sound</span>Scape</h1>
        </div>
    </div>
    <div class="herosection">
        <div class="plays d-flex flex-column align-items-center ">
            <div class="songslist bg-dark d-flex text-light rounded-pill ">
                <img src="images/cover1.avif" alt="">
                <h2>Blinding Lights </h2>
                <div class="time">
                
                    <i class="fa-solid fa-circle-play songplay fs-4 "></i>
                </div>
            </div>
            <div class="songslist bg-dark d-flex text-light rounded-pill ">
                <img src="images/cover2.avif" alt="">
                <h2>Levitating</h2>
                <div class="time">
                
                    <i class="fa-solid fa-circle-play songplay fs-4"></i>
                </div>
            </div>
            <div class="songslist bg-dark d-flex text-light rounded-pill ">
                <img src="images/cover3.avif" alt="">
                <h2>Believer</h2>
                <div class="time">
                
                    <i class="fa-solid fa-circle-play songplay fs-4"></i>
                </div>
            </div>
            <div class="songslist bg-dark d-flex text-light rounded-pill ">
                <img src="images/cover4.avif" alt="">
                <h2>Perfect</h2>
                <div class="time">
                
                    <i class="fa-solid fa-circle-play songplay fs-4"></i>
                </div>
            </div>
            <div class="songslist bg-dark d-flex text-light rounded-pill ">
                <img src="images/cover5.avif" alt="">
                <h2>Stay </h2>
                <div class="time">
                
                    <i class="fa-solid fa-circle-play songplay fs-4"></i>
                </div>
            </div>
            <div class="songslist bg-dark d-flex text-light rounded-pill ">
                <img src="images/cover6.avif" alt="">
                <h2>As It Was </h2>
                <div class="time">
                
                    <i class="fa-solid fa-circle-play songplay fs-4"></i>
                </div>
            </div>
            <input type="range"value=0 class="w-75 myprogressbar">
            <div class="buttons text-light fs-2 m-2 d-flex justify-content-center ">
                <div>
                    <img src="images/audio-wave.gif" class="gif" alt="">
                    <i class="fa-solid fa-backward-step me-3" id="prev"></i>
                    <i class="fa-solid fa-circle-play me-3 fs-1 playpausebtn"></i>
                    <i class="fa-solid fa-forward-step " id="next"></i>

                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
